<!DOCTYPE html>
<html>
<head>
    <title>Quiz - Soal</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">

    <!-- Tampilkan feedback dari soal sebelumnya (kalau ada) -->
        {% if feedback %}
            {% if "correct" in feedback %}
                <div class="feedback-correct">{{ feedback }}</div>
            {% else %}
                <div class="feedback-wrong">{{ feedback }}</div>
            {% endif %}
        {% endif %}

        <!-- Skor saat ini -->
        <span class="score-badge">Skor: {{ session.score }}</span>

        <!-- Pertanyaan -->
        <h2>{{ question.question }}</h2>

        <!-- Form jawaban -->
        <form method="POST">
            <div class="choices">
                {% for ans in answers %}
                    <label class="choice-label">
                        <input type="radio" name="answer" value="{{ ans }}">
                        {{ ans }}
                    </label>
                {% endfor %}
            </div>

                <button type="submit">Submit</button>
        </form>
    </div>
</body>
</html>
